info:
  name: Token ADMIN
  type: http
  seq: 2

http:
  method: POST
  url: https://localhost:8843/realms/python/protocol/openid-connect/token
  headers:
    - name: Content-Type
      value: application/x-www-form-urlencoded
  body:
    type: form-urlencoded
    data:
      - name: grant_type
        value: password
      - name: client_id
        value: python-client
      - name: client_secret
        value: lqOvrgoW1KvUIwicyP3XAyrPQAnRs7Ga
      - name: username
        value: admin
      - name: password
        value: p
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        bru.setEnvVar("adminToken", body.access_token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
